<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>ARTERRA 形狀藝術島 Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --c-blue:#1B4FBF;
    --c-purple:#6B3FA0;
    --c-gold:#C8952A;
    --c-teal:#0F7B6C;
    --hud-bg: rgba(0,0,0,0.52);
    --hud-border: rgba(255,255,255,0.18);
    --hud-border-strong: rgba(255,255,255,0.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#87ceeb; font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",-apple-system,sans-serif; user-select:none;}
  #canvas-wrap{position:fixed; inset:0;}
  canvas{display:block; width:100%; height:100%; touch-action:none;}

  .hud{position:fixed; inset:0; pointer-events:none; z-index:10;}
  .hud *{pointer-events:auto;}

  /* top season banner */
  .season-banner{
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    background:var(--hud-bg); backdrop-filter:blur(8px);
    border:0.5px solid var(--hud-border); border-radius:999px;
    padding:4px 16px; color:#fff; font-size:12px; display:flex; gap:8px; align-items:center;
  }
  .season-banner .dot{width:6px; height:6px; border-radius:50%; background:var(--c-gold);}

  /* top-right cluster */
  .top-left{position:absolute; top:10px; left:6px; width:min(46vw,170px);}
  .top-right{position:absolute; top:10px; right:6px; display:flex; flex-direction:column; align-items:flex-end; gap:5px; width:min(60vw,240px);}
  .panel-row{
    background:var(--hud-bg); backdrop-filter:blur(8px);
    border:0.5px solid var(--hud-border); border-radius:10px;
    padding:5px 8px; width:100%; display:flex; align-items:center; justify-content:space-between; gap:6px; color:#fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.22);
  }
  .currency{display:flex; gap:8px; font-size:11px; font-weight:500;}
  .currency span{display:flex; align-items:center; gap:3px;}
  .cur-dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
  .cur-inspire{background:var(--c-gold);}
  .cur-gem{background:var(--c-purple);}
  .cur-stamp{background:var(--c-teal);}

  .profile-row{font-size:11px; display:flex; align-items:center; gap:5px; width:100%;}
  .lvbadge{background:var(--c-blue); border-radius:5px; padding:2px 6px; font-size:10px; font-weight:700;}
  .xpbar{flex:1; height:5px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden;}
  .xpbar i{display:block; height:100%; width:38%; background:var(--c-gold);}

  .main-fn-row{display:flex; gap:5px; width:100%;}
  .fn-btn{
    flex:1; background:var(--hud-bg); backdrop-filter:blur(8px);
    border:0.5px solid var(--hud-border); border-radius:9px;
    padding:6px 3px; color:#fff; font-size:10px; font-weight:500; text-align:center; position:relative;
    box-shadow:0 2px 7px rgba(0,0,0,0.2);
  }
  .fn-btn.gold{border-color:rgba(200,149,42,0.6); background:linear-gradient(160deg, rgba(200,149,42,0.35), rgba(0,0,0,0.5));}
  .fn-btn .dot-alert{position:absolute; top:-2px; right:-2px; width:7px; height:7px; border-radius:50%; background:#e05252;}
  .fn-btn i{display:block; font-size:14px; margin-bottom:1px;}

  .minor-fn-row{display:flex; flex-wrap:wrap; gap:5px; justify-content:flex-end; width:100%;}
  .minor-btn{
    width:32px; height:32px; border-radius:50%;
    background:var(--hud-bg); backdrop-filter:blur(8px);
    border:0.5px solid var(--hud-border); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:14px;
  }

  /* left toolbar */
  .left-toolbar{position:absolute; left:6px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:7px;}
  .left-toolbar button{
    width:32px; height:32px; border-radius:50%;
    background:var(--hud-bg); backdrop-filter:blur(8px);
    border:0.5px solid var(--hud-border); color:#fff; font-size:14px;
  }

  /* chat */
  .chat-box{position:absolute; left:6px; bottom:108px; width:min(48vw,210px);}
  .chat-tabs{display:flex; gap:4px; margin-bottom:4px;}
  .chat-tabs span{font-size:10px; color:#fff; background:rgba(0,0,0,0.35); border-radius:6px; padding:2px 7px;}
  .chat-tabs span.active{background:var(--c-blue);}
  .chat-log{
    background:var(--hud-bg); backdrop-filter:blur(8px); border:0.5px solid var(--hud-border);
    border-radius:10px; padding:6px 9px; color:#fff; font-size:11px; line-height:1.55; max-height:52px; overflow:hidden;
  }

  /* joystick */
  .joy-wrap{
    position:absolute; left:16px; bottom:16px; width:78px; height:78px;
  }
  .joy-base{
    position:absolute; inset:0; border-radius:50%;
    background:rgba(255,255,255,0.10); backdrop-filter:blur(6px);
    border:1.5px solid rgba(255,255,255,0.35);
  }
  .joy-stick{
    position:absolute; width:32px; height:32px; border-radius:50%;
    left:50%; top:50%; margin-left:-16px; margin-top:-16px;
    background:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.8);
    transition:transform .05s linear;
  }
  .joy-wrap.active .joy-base{border-color:rgba(200,149,42,0.75);}
  .joy-wrap.active .joy-stick{background:rgba(200,149,42,0.75); border-color:rgba(200,149,42,0.9);}

  /* interact prompt */
  .interact-prompt{
    position:absolute; bottom:118px; left:50%; transform:translateX(-50%);
    background:linear-gradient(160deg, rgba(30,20,5,0.75), rgba(0,0,0,0.6));
    backdrop-filter:blur(10px); border:1.5px solid rgba(200,149,42,0.85);
    border-radius:999px; padding:9px 20px; display:none;
    box-shadow:0 4px 16px rgba(0,0,0,0.35), 0 0 12px rgba(200,149,42,0.3);
    animation:promptBounce 1.4s ease-in-out infinite;
    max-width:80vw;
  }
  .interact-prompt.show{display:block;}
  .interact-prompt span{
    font-family:"Noto Sans TC",sans-serif; font-weight:900; font-size:14px; letter-spacing:0.5px;
    background:linear-gradient(180deg, #FFE9B8 0%, #C8952A 60%, #E8B84B 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 5px rgba(0,0,0,0.35);
    white-space:nowrap;
  }
  @keyframes promptBounce{ 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-5px);} }

  /* bottom right shortcuts */
  .shortcuts{position:absolute; right:8px; bottom:16px; display:flex; flex-direction:column; align-items:flex-end; gap:5px;}
  .shortcuts .sbtn{
    width:38px; height:38px; border-radius:50%; background:var(--hud-bg); backdrop-filter:blur(8px);
    border:0.5px solid var(--hud-border); color:#fff; font-size:15px; display:flex; align-items:center; justify-content:center;
  }

  /* zone label */
  .zone-label{
    position:absolute; top:44%; left:50%; transform:translate(-50%,-50%);
    color:#fff; font-size:15px; font-weight:500; text-shadow:0 1px 6px rgba(0,0,0,0.6);
    background:rgba(0,0,0,0.28); padding:4px 14px; border-radius:999px; opacity:0; transition:opacity .3s;
  }
  .zone-label.show{opacity:1;}

  /* generic overlay panel */
  .overlay{
    position:absolute; inset:0; background:rgba(0,0,0,0.45); display:none; align-items:center; justify-content:center; z-index:30;
  }
  .overlay.show{display:flex;}
  .sheet{
    width:min(92vw,380px); max-height:78vh; overflow:auto;
    background:rgba(20,22,30,0.86); backdrop-filter:blur(10px);
    border:0.5px solid var(--hud-border-strong); border-radius:16px; padding:14px; color:#fff;
  }
  .sheet-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .sheet-head h3{margin:0; font-size:16px; font-weight:500;}
  .sheet-close{width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.12); border:none; color:#fff; font-size:14px;}

  .grid8{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .slot{aspect-ratio:1; border-radius:10px; background:rgba(255,255,255,0.08); border:1px solid var(--hud-border);}

  .shop-tabs{display:flex; gap:6px; margin-bottom:10px;}
  .shop-tabs span{font-size:11px; padding:5px 10px; border-radius:999px; background:rgba(255,255,255,0.1);}
  .shop-tabs span.on{background:var(--c-blue);}
  .shop-card{background:rgba(255,255,255,0.07); border-radius:10px; padding:10px; margin-bottom:8px; display:flex; gap:10px; align-items:center;}
  .shop-thumb{width:44px; height:44px; border-radius:8px; flex-shrink:0;}
  .shop-info{flex:1; font-size:12px;}
  .shop-price{font-size:11px; color:var(--c-gold);}

  .pass-track{display:flex; gap:4px; overflow-x:auto; padding-bottom:6px;}
  .pass-lv{width:34px; height:34px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px;}
  .pass-lv.on{background:var(--c-gold); color:#3a2a05;}
  .pass-lv.off{background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.5);}

  .friend-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:12px;}
  .friend-dot{width:8px; height:8px; border-radius:50%;}
  .empty-hint{font-size:12px; color:rgba(255,255,255,0.55); text-align:center; padding:20px 0;}

  .ttt-sheet{width:min(88vw,320px);}
  .ttt-status{font-size:13px; text-align:center; margin-bottom:12px; color:rgba(255,255,255,0.85); min-height:18px;}
  .ttt-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;}
  .ttt-cell{
    aspect-ratio:1; border-radius:12px; background:rgba(255,255,255,0.08); border:1px solid var(--hud-border);
    font-size:30px; font-weight:900; display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .ttt-cell.x{color:#6FA8FF;}
  .ttt-cell.o{color:#E07A9A;}
  .ttt-restart{
    width:100%; padding:10px; border-radius:10px; border:none; background:var(--c-blue); color:#fff; font-size:13px; font-weight:500;
  }

  /* dialogue */
  .dialogue{position:absolute; left:0; right:0; bottom:0; padding:16px; display:none; z-index:25;}
  .dialogue.show{display:block;}
  .dialogue-box{
    background:var(--hud-bg); backdrop-filter:blur(8px); border:0.5px solid var(--hud-border-strong);
    border-radius:14px; padding:14px; color:#fff; max-width:520px; margin:0 auto;
  }
  .dialogue-name{color:var(--c-gold); font-size:13px; font-weight:500; margin-bottom:4px;}
  .dialogue-text{font-size:13px; line-height:1.7;}
  .dialogue-next{margin-top:10px; text-align:right; font-size:12px; color:rgba(255,255,255,0.6);}

  /* artwork card */
  .art-card{
    position:absolute; left:50%; bottom:0; transform:translateX(-50%);
    width:min(92vw,380px); background:rgba(20,22,30,0.88); backdrop-filter:blur(10px);
    border:0.5px solid var(--hud-border-strong); border-radius:16px 16px 0 0; padding:16px; color:#fff;
    display:none; z-index:25;
  }
  .art-card.show{display:block;}
  .art-title{font-size:15px; font-weight:500; color:var(--c-gold); margin-bottom:6px;}
  .art-desc{font-size:12px; line-height:1.7; color:rgba(255,255,255,0.85);}
  .art-close{position:absolute; top:10px; right:10px; width:26px; height:26px; border-radius:50%; background:rgba(255,255,255,0.12); border:none; color:#fff;}

  .loading{position:fixed; inset:0; background:#0d1220; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; z-index:99;}

  .rotate-prompt{
    position:fixed; inset:0; background:#0d1220; color:#fff; z-index:200;
    display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px; text-align:center; padding:24px;
  }
  .rotate-prompt.show{display:flex;}
  .rotate-icon{font-size:44px; animation:rotatePulse 1.6s ease-in-out infinite;}
  .rotate-prompt p{font-size:13px; color:rgba(255,255,255,0.7); max-width:260px; line-height:1.6; margin:0;}
  @keyframes rotatePulse{ 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(90deg);} }
</style>
</head>
<body>

<div id="loading" class="loading">正在建構 ARTERRA 島嶼…</div>

<div class="rotate-prompt" id="rotatePrompt">
  <div class="rotate-icon">📱</div>
  <div style="font-size:15px; font-weight:500;">請將手機橫向操作</div>
  <p>ARTERRA 設計為橫向遊玩體驗，將手機轉為橫向即可開始探索小島。</p>
</div>

<div id="canvas-wrap"></div>

<div class="hud">
  <div class="season-banner"><span class="dot"></span>第一季 · 色彩的呼吸 · Day 12</div>

  <div class="top-left">
    <div class="panel-row profile-row">
      <span class="lvbadge">Lv 6</span>
      <span>訪客 · 藝術島民</span>
      <div class="xpbar"><i></i></div>
    </div>
  </div>

  <div class="top-right">
    <div class="panel-row currency">
      <span><i class="cur-dot cur-inspire"></i>2,480</span>
      <span><i class="cur-dot cur-gem"></i>60</span>
      <span><i class="cur-dot cur-stamp"></i>132</span>
    </div>
    <div class="main-fn-row">
      <button class="fn-btn gold" data-panel="pass">🎫 通行證<div class="dot-alert"></div></button>
      <button class="fn-btn gold" data-panel="shop">🛍 商城</button>
      <button class="fn-btn" data-panel="event">🎉 活動</button>
    </div>
    <div class="minor-fn-row">
      <button class="minor-btn" data-panel="friend" title="好友">👥</button>
      <button class="minor-btn" data-panel="home" title="家園">🏠</button>
      <button class="minor-btn" data-panel="fashion" title="時裝">👗</button>
      <button class="minor-btn" data-panel="collection" title="收藏">⭐</button>
      <button class="minor-btn" data-panel="achieve" title="成就">🏆</button>
      <button class="minor-btn" data-panel="bag" title="背包">🎒</button>
      <button class="minor-btn" data-panel="rank" title="排行">📊</button>
    </div>
  </div>

  <div class="left-toolbar">
    <button title="地圖">🗺️</button>
    <button title="截圖">📷</button>
    <button title="表情">😊</button>
    <button title="設定">⚙️</button>
  </div>

  <div class="chat-box">
    <div class="chat-tabs"><span class="active">全體</span><span>附近</span><span>好友</span><span>公會</span></div>
    <div class="chat-log">
      系統：歡迎來到 ARTERRA 形狀藝術島。<br>
      艾拉：試著靠近我聊聊島的故事吧！
    </div>
  </div>

  <div class="zone-label" id="zoneLabel"></div>
  <div class="interact-prompt" id="interactPrompt"><span id="interactPromptText">輕點螢幕與艾拉互動</span></div>

  <div class="joy-wrap" id="joyWrap">
    <div class="joy-base"></div>
    <div class="joy-stick" id="joyStick"></div>
  </div>

  <div class="shortcuts">
    <div class="sbtn" id="jumpBtn" title="跳躍">↑</div>
  </div>

  <!-- panels -->
  <div class="overlay" id="overlay">
    <div class="sheet" id="sheetContent"></div>
  </div>

  <!-- NPC dialogue -->
  <div class="dialogue" id="dialogue">
    <div class="dialogue-box">
      <div class="dialogue-name" id="dialogueName">艾拉 · 港口引導員</div>
      <div class="dialogue-text" id="dialogueText"></div>
      <div class="dialogue-next" id="dialogueNext">輕點繼續 ›</div>
    </div>
  </div>

  <!-- artwork card -->
  <div class="art-card" id="artCard">
    <button class="art-close" id="artClose">✕</button>
    <div class="art-title" id="artTitle"></div>
    <div class="art-desc" id="artDesc"></div>
  </div>

  <!-- tic-tac-toe with 可可 -->
  <div class="overlay" id="tictactoe">
    <div class="sheet ttt-sheet">
      <div class="sheet-head"><h3>與可可玩井字棋</h3><button class="sheet-close" id="tttClose">✕</button></div>
      <div class="ttt-status" id="tttStatus">你是 ✕，可可是 ◯ — 輪到你了！</div>
      <div class="ttt-grid" id="tttGrid"></div>
      <button class="ttt-restart" id="tttRestart">重新開始</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";

var scene, camera, renderer, clock;
var islandGroup, galleryGroup, guildGroup;
var player, playerVel = new THREE.Vector3();
var moveDir = new THREE.Vector2(0,0);
var jumping=false, jumpT=0;
var npc, npcHead;
var npc2;
var npc2Pos = new THREE.Vector3(20, 0, 6);
var guildDoorPos = new THREE.Vector3(-42, 0, 6);
var guildNPCPos = new THREE.Vector3(0, 0, -3);
var entranceArrow;
var guildEntranceArrow;
var museumDoorPos = new THREE.Vector3(0, 0, -26);
var npcPos = new THREE.Vector3(9, 0, -22);
var inGallery = false;
var inGuild = false;
var nearNPC = false, nearMuseum = false, nearExit=false, nearArt=-1, nearNPC2=false;
var nearGuildDoor=false, nearGuildNPC=false, nearGuildExit=false;

var elaLines = [
  "歡迎來到 ARTERRA，我是艾拉，島上的引導員。",
  "西元 2087 年，一群藝術家與科技創業者在太平洋上建起了這座人工浮島。",
  "『SAI』在古老語言中意為『色彩的呼吸』——這座島的誕生，是為了讓藝術從螢幕走向真實的空間。",
  "『形狀是最初的語言，藝術是最後的家。』這句話刻在中央廣場的石碑上，是我們最重要的信念。",
  "北邊的主美術館裡，收藏著現代、古典與數位三種主題的展品，去看看吧！"
];

var guildLines = [
  "歡迎來到藝術家公會，我是薰特，這裡是公會長辦公室。",
  "只要是在 ARTERRA 定居的藝術家，都可以在這裡申請屬於自己的「個人藝術館」。",
  "個人藝術館可以自由佈置、展出你自己的作品，是這座島給每位創作者的禮物。",
  "讓我幫你送出申請吧！"
];

var dialogueLines = elaLines; // active speaker's lines (swapped by startDialogue)
var dialogueIdx = 0;
var dialogueOnComplete = null;

var artworks = [
  {title:"靜默之海", desc:"現代藝術館館藏。以層疊的藍與灰描繪深海的寧靜，據說是最受訪客收藏的作品之一。", color:0x1B4FBF},
  {title:"色彩的呼吸", desc:"以島名為題的紀念創作，暖橙與金色線條交織，象徵 ARTERRA 誕生的那一刻。", color:0xC8952A},
  {title:"形狀之語", desc:"古典藝術廊風格的幾何構成，探討『形狀是最初的語言』這一島嶼信念。", color:0x6B3FA0},
  {title:"潮間帶", desc:"數位藝術館的生成藝術作品，青綠色調呼應生活休閒區的海岸線。", color:0x0F7B6C},
  {title:"無題 · 訪客之心", desc:"由聯合創作活動誕生的作品，收錄全島玩家共同繪製的畫布片段。", color:0xE07A5F},
  {title:"晶格之心", desc:"立體雕塑作品。多面體造型象徵島嶼建立初期的結構藍圖，是左側展廳的代表作。", color:0x9B7BD9},
  {title:"環迴", desc:"立體雕塑作品。環形結構緩緩旋轉，寓意 ARTERRA 上藝術與生活循環不息的日常。", color:0x0F7B6C},

function onResize(){

/* ---------- landscape orientation support ---------- */
function checkOrientation(){
  var isPortrait = window.innerHeight > window.innerWidth;
  var isMobileish = Math.min(window.innerWidth, window.innerHeight) < 700;
  var el = document.getElementById('rotatePrompt');
  if(el) el.classList.toggle('show', isPortrait && isMobileish);
}

function tryLockLandscape(){
  var el = document.documentElement;
  var reqFs = el.requestFullscreen || el.webkitRequestFullscreen;
  try{
    if(reqFs){
      reqFs.call(el).then(function(){
        if(screen.orientation && screen.orientation.lock){
          screen.orientation.lock('landscape').catch(function(){});
        }
      }).catch(function(){});
    } else if(screen.orientation && screen.orientation.lock){
      screen.orientation.lock('landscape').catch(function(){});
    }
  } catch(e){ /* orientation lock not supported (e.g. iOS Safari) - rotate prompt covers this case */ }
}
document.addEventListener('touchstart', tryLockLandscape, {once:true});
document.addEventListener('click', tryLockLandscape, {once:true});
window.addEventListener('orientationchange', checkOrientation);
checkOrientation();

/* ---------- geometry helpers ---------- */
function disk(radius, color, y, segments, texture){
  var geo = new THREE.CircleGeometry(radius, segments||36);
  var mat = texture ? new THREE.MeshLambertMaterial({map:texture}) : new THREE.MeshLambertMaterial({color:color});
  var m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI/2;
  m.position.y = y;
  return m;
}

function box(w,h,d,color,texture){
  var geo = new THREE.BoxGeometry(w,h,d);
  var mat = texture ? new THREE.MeshLambertMaterial({map:texture}) : new THREE.MeshLambertMaterial({color:color});
  return new THREE.Mesh(geo, mat);
}

/* ---------- procedural material textures (no external images needed) ---------- */
function shadeHex(hex, amt){
  var num = hex; var r=(num>>16)+amt, g=((num>>8)&0xff)+amt, b=(num&0xff)+amt;
  r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
  return 'rgb('+r+','+g+','+b+')';
}

function makeSkyTexture(){
  var c = document.createElement('canvas'); c.width=8; c.height=512;
  var ctx = c.getContext('2d');
  var grad = ctx.createLinearGradient(0,0,0,c.height);
  grad.addColorStop(0, '#6FA3D9');
  grad.addColorStop(0.35, '#9FC3DE');
  grad.addColorStop(0.62, '#F0BFAE');
  grad.addColorStop(0.8, '#F6D5A8');
  grad.addColorStop(1, '#F9E3B8');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,c.width,c.height);
  var tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  return tex;
}

function makeGrassTexture(){
  var c = document.createElement('canvas'); c.width=128; c.height=128;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#3f9a5c';
  ctx.fillRect(0,0,128,128);
  for (var i=0;i<900;i++){
    var x = Math.random()*128, y = Math.random()*128;
    var tone = 20 + Math.random()*60 - 30;
    ctx.fillStyle = shadeHex(0x3f9a5c, tone);
    ctx.globalAlpha = 0.5;
    ctx.fillRect(x,y, 2+Math.random()*2, 2+Math.random()*2);
  }
  ctx.globalAlpha = 1;
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(18,18);
  tex.needsUpdate = true;
  return tex;
}

function makeMarbleTexture(){
  var c = document.createElement('canvas'); c.width=256; c.height=256;
  var ctx = c.getContext('2d');
  var grad = ctx.createLinearGradient(0,0,256,256);
  grad.addColorStop(0,'#F7F4EC'); grad.addColorStop(1,'#E7E1D2');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,256,256);
  ctx.strokeStyle = 'rgba(170,160,140,0.35)';
  for (var i=0;i<14;i++){
    ctx.beginPath();
    var sy = Math.random()*256;
    ctx.moveTo(0, sy);
    var cx1=Math.random()*256, cy1=sy+(Math.random()*60-30);
    var cx2=Math.random()*256, cy2=sy+(Math.random()*60-30);
    ctx.bezierCurveTo(cx1,cy1,cx2,cy2,256, sy+(Math.random()*40-20));
    ctx.lineWidth = 0.6+Math.random()*1.2;
    ctx.stroke();
  }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(2,1.4);
  tex.needsUpdate = true;
  return tex;
}

function makeWoodTexture(){
  var c = document.createElement('canvas'); c.width=128; c.height=128;
  var ctx = c.getContext('2d');
  ctx.fillStyle = '#8a6a45';
  ctx.fillRect(0,0,128,128);
  for (var y=0;y<128;y+=8){
    ctx.fillStyle = shadeHex(0x8a6a45, (Math.random()*30-15));
    ctx.fillRect(0,y,128,7);
  }
  ctx.strokeStyle = 'rgba(60,40,20,0.3)';
  ctx.lineWidth = 1;
  for (var x=0;x<128;x+=14){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x+(Math.random()*6-3),128); ctx.stroke();
  }
  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4,2);
  tex.needsUpdate = true;
  return tex;
}

function makePathTexture(){
  var c = document.createElement('canvas'); c.width=128; c.height=128;
  var ctx = c.getContext('2d');
  var grad = ctx.createLinearGradient(0,0,128,128);
  grad.addColorStop(0,'#F2EFE6'); grad.addColorStop(1,'#E4DECF');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,128,128);

  // 大理石紋脈
  ctx.strokeStyle = 'rgba(170,160,140,0.3)';
  for (var v=0;v<6;v++){
    ctx.beginPath();
    var sy = Math.random()*128;
    ctx.moveTo(0, sy);
    ctx.bezierCurveTo(Math.random()*128, sy+(Math.random()*30-15), Math.random()*128, sy+(Math.random()*30-15), 128, sy+(Math.random()*20-10));
    ctx.lineWidth = 0.6+Math.random();
    ctx.stroke();
  }

  // 地磚拼接格線
  ctx.strokeStyle = 'rgba(140,130,110,0.45)';
  ctx.lineWidth = 2;
  for (var gx=0; gx<=128; gx+=32){
    ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,128); ctx.stroke();
  }
  for (var gy=0; gy<=128; gy+=32){
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(128,gy); ctx.stroke();
  }

  var tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(5,26);
  tex.needsUpdate = true;
  return tex;
}

  // rounded bush clusters + tiny flower dots along the main plaza, for a
  // tidy, storybook Animal-Crossing feel rather than bare grass
  var bushSpots = [[-8,-14],[8,-14],[-30,-4],[30,6],[10,34],[-10,34]];
  for (var bsi=0; bsi<bushSpots.length; bsi++){
    addBushCluster(bushSpots[bsi][0], bushSpots[bsi][1]);
  }
  var flowerColors = [0xE07A9A,0xF2D24C,0xFFFFFF,0x9B7BD9];
  for (var fl=0; fl<24; fl++){
    var fang = Math.random()*Math.PI*2;
    var fr = 6+Math.random()*30;
    var fx = Math.cos(fang)*fr, fz = Math.sin(fang)*fr - 2;
    if(inAvenue(fx,fz)) continue;
    addFlowerDot(fx, fz, flowerColors[fl%flowerColors.length]);
  }
}

/* checks whether a point falls on the central avenue, so decorations avoid it */
function inAvenue(x,z){
  return Math.abs(x) < 6.5 && z > -30 && z < 42;
}

/* generate an original, non-infringing abstract pattern per artwork (canvas -> texture) */
function makeArtTexture(idx, baseColorHex){
  var c = document.createElement('canvas');
  c.width = 256; c.height = 292;
  var ctx = c.getContext('2d');
  var base = '#'+baseColorHex.toString(16).padStart(6,'0');

  function shade(hex, amt){
    var num = parseInt(hex.slice(1),16);
    var r = Math.max(0,Math.min(255,(num>>16)+amt));
    var g = Math.max(0,Math.min(255,((num>>8)&0xff)+amt));
    var b = Math.max(0,Math.min(255,(num&0xff)+amt));
    return 'rgb('+r+','+g+','+b+')';
  }

  // background gradient
  var grad = ctx.createLinearGradient(0,0,0,c.height);
  grad.addColorStop(0, shade(base,40));
  grad.addColorStop(1, shade(base,-40));
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,c.width,c.height);

  if(idx===0){
    // 靜默之海 - layered wave bands
    for (var w=0; w<6; w++){
      ctx.beginPath();
      var yy = 40 + w*38;
      ctx.moveTo(0, yy);
      for (var x=0; x<=c.width; x+=16){
        ctx.lineTo(x, yy + Math.sin((x/40)+w)*10);
      }
      ctx.lineTo(c.width, c.height); ctx.lineTo(0, c.height); ctx.closePath();
      ctx.fillStyle = shade(base, -10 + w*8);
      ctx.globalAlpha = 0.55;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(200,55,22,0,Math.PI*2);
    ctx.fillStyle = shade(base,90); ctx.fill();
  } else if(idx===1){
    // 色彩的呼吸 - radiating sunburst
    ctx.save();
    ctx.translate(c.width/2, c.height/2);
    var rays = 16;
    for (var r=0;r<rays;r++){
      ctx.rotate(Math.PI*2/rays);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(140, -10);
      ctx.lineTo(140, 10);
      ctx.closePath();
      ctx.fillStyle = shade(base, (r%2===0?50:-20));
      ctx.globalAlpha = 0.75;
      ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(c.width/2,c.height/2,30,0,Math.PI*2);
    ctx.fillStyle = shade(base,80); ctx.fill();
  } else if(idx===2){
    // 形狀之語 - geometric grid of shapes
    var shapes = ['tri','rect','circ'];
    var gsize = 44;
    var s=0;
    for (var yy2=10; yy2<c.height-10; yy2+=gsize){
      for (var xx=10; xx<c.width-10; xx+=gsize){
        var kind = shapes[s%3]; s++;
        ctx.fillStyle = shade(base, ((s%4)*22 - 33));
        ctx.globalAlpha = 0.85;
        if(kind==='rect'){ ctx.fillRect(xx,yy2,gsize-10,gsize-10); }
        else if(kind==='circ'){ ctx.beginPath(); ctx.arc(xx+gsize/2-5,yy2+gsize/2-5,gsize/2-6,0,Math.PI*2); ctx.fill(); }
        else { ctx.beginPath(); ctx.moveTo(xx,yy2+gsize-10); ctx.lineTo(xx+(gsize-10)/2,yy2); ctx.lineTo(xx+gsize-10,yy2+gsize-10); ctx.closePath(); ctx.fill(); }
      }
    }
    ctx.globalAlpha = 1;
  } else if(idx===3){
    // 潮間帶 - generative dot matrix
    for (var yy3=14; yy3<c.height-14; yy3+=22){
      for (var xx3=14; xx3<c.width-14; xx3+=22){
        var rad = 4 + ((xx3*yy3)%13)*0.7;
        ctx.beginPath();
        ctx.arc(xx3,yy3,rad,0,Math.PI*2);
        ctx.fillStyle = shade(base, ((xx3+yy3)%60)-30);
        ctx.globalAlpha = 0.8;
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  } else {
    // 無題訪客之心 - collaged mosaic patchwork
    var cell = 26;
    for (var yy4=0; yy4<c.height; yy4+=cell){
      for (var xx4=0; xx4<c.width; xx4+=cell){
        var tone = shade(base, (Math.sin(xx4*0.13+yy4*0.09)*50));
        ctx.fillStyle = tone;
        ctx.globalAlpha = 0.9;
        ctx.fillRect(xx4,yy4,cell-2,cell-2);
      }
    }
    ctx.globalAlpha = 1;
  }

  // subtle border / signature dot to feel like a finished piece
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 6;
  ctx.strokeRect(6,6,c.width-12,c.height-12);

  var tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  return tex;
}

/* 角色頭頂名字標籤(隨時面向鏡頭的粗體浮動文字) */
function makeNameSprite(text){
  var c = document.createElement('canvas');
  c.width = 320; c.height = 120;
  var ctx = c.getContext('2d');
  ctx.fillStyle = 'rgba(15,10,5,0.55)';
  var rx=30, ry=30, rw=260, rh=60, rr=30;
  ctx.beginPath();
  ctx.moveTo(rx+rr,ry);
  ctx.arcTo(rx+rw,ry,rx+rw,ry+rh,rr);
  ctx.arcTo(rx+rw,ry+rh,rx,ry+rh,rr);
  ctx.arcTo(rx,ry+rh,rx,ry,rr);
  ctx.arcTo(rx,ry,rx+rw,ry,rr);
  ctx.closePath();
  ctx.fill();

  ctx.font = 'bold 52px "Noto Sans TC", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 7;
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.strokeText(text, 160, 62);
  ctx.fillStyle = '#FFE9B8';
  ctx.fillText(text, 160, 62);

  var tex = new THREE.CanvasTexture(c);
  var mat = new THREE.SpriteMaterial({map:tex, depthTest:false});
  var sprite = new THREE.Sprite(mat);
  sprite.scale.set(2.4, 0.9, 1);
  return sprite;
}

/* ---------- fixed disc joystick: drag direction = move direction ---------- */
var joyVec = new THREE.Vector2();
var joyActive = false;
var joyCenter = {x:0, y:0};
var joyMaxRadius = 26;

function setupJoystick(){
  var wrap = document.getElementById('joyWrap');
  var stick = document.getElementById('joyStick');

  function getCenter(){
    var r = wrap.getBoundingClientRect();
    joyCenter.x = r.left + r.width/2;
    joyCenter.y = r.top + r.height/2;
  }

  function updateFromPoint(x,y){
    var dx = x - joyCenter.x;
    var dy = y - joyCenter.y;
    var len = Math.sqrt(dx*dx+dy*dy);
    if(len > joyMaxRadius){
      dx = dx/len*joyMaxRadius;
      dy = dy/len*joyMaxRadius;
    }
    stick.style.transform = 'translate('+dx+'px,'+dy+'px)';
    joyVec.set(dx/joyMaxRadius, dy/joyMaxRadius);
  }

  function start(x,y){
    getCenter();
    joyActive = true;
    wrap.classList.add('active');
    updateFromPoint(x,y);
  }
  function move(x,y){
    if(!joyActive) return;
    updateFromPoint(x,y);
  }
  function end(){
    joyActive = false;
    wrap.classList.remove('active');
    stick.style.transform = 'translate(0px,0px)';
    joyVec.set(0,0);
  }

  wrap.addEventListener('touchstart', function(e){ var t=e.changedTouches[0]; start(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});
  window.addEventListener('touchmove', function(e){ if(!joyActive) return; var t=e.changedTouches[0]; move(t.clientX,t.clientY); e.preventDefault(); }, {passive:false});
  window.addEventListener('touchend', function(){ if(joyActive) end(); });
  window.addEventListener('touchcancel', function(){ if(joyActive) end(); });

  wrap.addEventListener('mousedown', function(e){ start(e.clientX,e.clientY); });
  window.addEventListener('mousemove', function(e){ if(joyActive) move(e.clientX,e.clientY); });
  window.addEventListener('mouseup', function(){ if(joyActive) end(); });

  document.getElementById('jumpBtn').addEventListener('click', function(){
    if(!jumping){ jumping=true; jumpT=0; }
  });
  document.getElementById('jumpBtn').addEventListener('touchstart', function(e){
    e.preventDefault();
    if(!jumping){ jumping=true; jumpT=0; }
  }, {passive:false});
}

/* ---------- tic-tac-toe with 可可 ---------- */
var tttBoard = ['','','','','','','','',''];
var tttOver = false;
var WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function tttCheckWinner(b){
  for (var i=0;i<WIN_LINES.length;i++){
    var l = WIN_LINES[i];
    if(b[l[0]] && b[l[0]]===b[l[1]] && b[l[1]]===b[l[2]]) return b[l[0]];
  }
  if(b.indexOf('')===-1) return 'draw';
  return null;
}

function tttRenderBoard(){
  var grid = document.getElementById('tttGrid');
  grid.innerHTML = '';
  for (var i=0;i<9;i++){
    var cell = document.createElement('div');
    cell.className = 'ttt-cell' + (tttBoard[i]==='X'?' x':'') + (tttBoard[i]==='O'?' o':'');
    cell.textContent = tttBoard[i]==='X' ? '✕' : (tttBoard[i]==='O' ? '◯' : '');
    cell.setAttribute('data-idx', i);
    grid.appendChild(cell);
  }
}

function tttPlayerMove(idx){
  if(tttOver || tttBoard[idx]!=='') return;
  tttBoard[idx] = 'X';
  tttRenderBoard();
  var result = tttCheckWinner(tttBoard);
  if(result){ tttEnd(result); return; }

  document.getElementById('tttStatus').textContent = '可可思考中…';
  setTimeout(function(){
    tttAiMove();
    var r2 = tttCheckWinner(tttBoard);
    tttRenderBoard();
    if(r2){ tttEnd(r2); }
    else { document.getElementById('tttStatus').textContent = '你是 ✕，可可是 ◯ — 輪到你了！'; }
  }, 450);
}

function tttAiMove(){
  // 1) take a winning move if available
  for (var i=0;i<9;i++){
    if(tttBoard[i]==='') { tttBoard[i]='O'; if(tttCheckWinner(tttBoard)==='O') return; tttBoard[i]=''; }
  }
  // 2) block player's winning move
  for (var j=0;j<9;j++){
    if(tttBoard[j]==='') { tttBoard[j]='X'; if(tttCheckWinner(tttBoard)==='X'){ tttBoard[j]='O'; return; } tttBoard[j]=''; }
  }
  // 3) take center, then a random empty cell
  if(tttBoard[4]===''){ tttBoard[4]='O'; return; }
  var empties = [];
  for (var k=0;k<9;k++){ if(tttBoard[k]==='') empties.push(k); }
  if(empties.length>0){ tttBoard[empties[Math.floor(Math.random()*empties.length)]] = 'O'; }
}

function tttEnd(result){
  tttOver = true;
  var status = document.getElementById('tttStatus');
  if(result==='X') status.textContent = '🎉 你贏了！';
  else if(result==='O') status.textContent = '可可獲勝，再挑戰一次吧！';
  else status.textContent = '平手！勢均力敵～';
}

function tttReset(){
  tttBoard = ['','','','','','','','',''];
  tttOver = false;
  document.getElementById('tttStatus').textContent = '你是 ✕，可可是 ◯ — 輪到你了！';
  tttRenderBoard();
}

/* ---------- zone label ---------- */
var zones = [
  {name:"中央廣場 Agora", x:0,z:0, r:9},
  {name:"港口區 Dockyard", x:0,z:40, r:14},
  {name:"主美術館區 Grand Gallery", x:0,z:-38, r:20},
  {name:"個人美術館區 Artist Alley", x:-24,z:0, r:10},
  {name:"藝術家公會 Artist Guild", x:-42,z:0, r:10},
  {name:"生活休閒區 Leisure Cove", x:24,z:4, r:10}
];
var lastZone = "";
function updateZoneLabel(){
  if(inGallery) { document.getElementById('zoneLabel').classList.remove('show'); return; }
  var p = player.position;
  var current = null;
  for (var i=0;i<zones.length;i++){
    var z = zones[i];
    var dx=p.x-z.x, dz=p.z-z.z;
    if(Math.sqrt(dx*dx+dz*dz) < z.r){ current = z.name; break; }
  }
  var label = document.getElementById('zoneLabel');
  if(current && current!==lastZone){
    label.textContent = current;
    label.classList.add('show');
    lastZone = current;
    clearTimeout(window._zt);
    window._zt = setTimeout(function(){ label.classList.remove('show'); }, 2200);
  } else if(!current){
    lastZone = "";
  }
}

/* ---------- animation loop ---------- */
function animate(){
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);

  var speed = 7.5;
  var moving = (Math.abs(joyVec.x)>0.05 || Math.abs(joyVec.y)>0.05);
  if(moving){
    // Stable absolute/map-direction control: the direction you drag the
    // joystick IS the direction the character walks on the map. The
    // character turns to face that direction, and the camera swings around
    // to stay behind. (A camera-relative version was tried, but it has an
    // unavoidable instability at the exact backward direction — the target
    // angle sits exactly on the wrap-around boundary and never converges,
    // causing a perpetual spin — so this reverts to the version with no
    // such feedback loop, which is stable in every direction.)
    var mvx = joyVec.x;
    var mvz = joyVec.y;

    player.position.x += mvx*speed*dt;
    player.position.z += mvz*speed*dt;

    var targetRot = Math.atan2(mvx, mvz);
    var curRot = player.rotation.y;
    var diff = targetRot - curRot;
    while(diff>Math.PI) diff -= Math.PI*2;
    while(diff<-Math.PI) diff += Math.PI*2;
    player.rotation.y += diff*Math.min(1, dt*8);

    var bob = Math.sin(Date.now()*0.015)*0.06;
    var legBaseY = player.userData.legBaseY !== undefined ? player.userData.legBaseY : 0.28;
    var headBaseY = player.userData.headBaseY !== undefined ? player.userData.headBaseY : 1.7;
    player.userData.legs.forEach(function(leg,i){
      leg.position.y = legBaseY + Math.abs(Math.sin(Date.now()*0.015 + i*1.5))*0.08;
    });
    player.userData.head.position.y = headBaseY + bob;
  }

  if(!inGallery && !inGuild){
    var half = 72;
    player.position.x = Math.max(-half, Math.min(half, player.position.x));
    player.position.z = Math.max(-half, Math.min(half, player.position.z));
  } else if(inGallery){
    player.position.x = Math.max(-19.5, Math.min(19.5, player.position.x));
    player.position.z = Math.max(-12, Math.min(12.5, player.position.z));
  } else if(inGuild){
    player.position.x = Math.max(-9, Math.min(9, player.position.x));
    player.position.z = Math.max(-7, Math.min(7.8, player.position.z));
  }

  if(jumping){
    jumpT += dt*3.2;
    if(jumpT>=Math.PI){ jumping=false; player.position.y=0; }
    else { player.position.y = Math.sin(jumpT)*1.6; }
  }

  // camera follow: standard 3rd-person, always trails behind the character's
  // current facing direction (rotates together with the player, no separate
  // reference variable — this is what avoids the instability above)
  var camOffset = new THREE.Vector3(
    -Math.sin(player.rotation.y)*10,
    6.5,
    -Math.cos(player.rotation.y)*10
  );
  var desiredCamPos = player.position.clone().add(camOffset);
  camera.position.lerp(desiredCamPos, 1-Math.pow(0.001,dt));
  var lookTarget = player.position.clone().add(new THREE.Vector3(0,1.3,0));
  camera.lookAt(lookTarget);

  // proximity checks
  var promptText = document.getElementById('interactPromptText');
  var promptEl = document.getElementById('interactPrompt');

  if(!inGallery && !inGuild){
    nearNPC = player.position.distanceTo(npcPos) < 3.2;
    nearMuseum = player.position.distanceTo(museumDoorPos) < 3.5;
    nearNPC2 = player.position.distanceTo(npc2Pos) < 3.2;
    nearGuildDoor = player.position.distanceTo(guildDoorPos) < 3.5;
    nearExit = false;

    if(nearNPC && !document.getElementById('dialogue').classList.contains('show')){
      promptText.textContent = "輕點螢幕與艾拉互動";
      promptEl.classList.add('show');
    } else if(nearNPC2 && !document.getElementById('tictactoe').classList.contains('show')){
      promptText.textContent = "輕點螢幕與可可玩井字棋";
      promptEl.classList.add('show');
    } else if(nearMuseum){
      promptText.textContent = "輕點螢幕進入主美術館";
      promptEl.classList.add('show');
    } else if(nearGuildDoor){
      promptText.textContent = "輕點螢幕進入藝術家公會";
      promptEl.classList.add('show');
    } else {
      promptEl.classList.remove('show');
    }
    npc.lookAt(player.position.x, 1.2, player.position.z);
    npc2.lookAt(player.position.x, 1.2, player.position.z);

    // entrance arrow bob + gentle spin
    if(entranceArrow){
      entranceArrow.position.y = 8.5 + Math.sin(Date.now()*0.003)*0.6;
      entranceArrow.rotation.y += dt*1.2;
    }
    if(guildEntranceArrow){
      guildEntranceArrow.position.y = 7.5 + Math.sin(Date.now()*0.003 + 1.5)*0.6;
      guildEntranceArrow.rotation.y += dt*1.2;
    }
  } else if(inGallery){
    nearExit = player.position.distanceTo(new THREE.Vector3(0,0,12)) < 3;

    nearArt = -1;
    var bestDist = 2.6;
    for (var ai=0; ai<artFloorPositions.length; ai++){
      var ap = artFloorPositions[ai];
      var dx = player.position.x - ap.x, dz = player.position.z - ap.z;
      var d = Math.sqrt(dx*dx+dz*dz);
      if(d < bestDist){ bestDist = d; nearArt = ap.index; }
    }

    if(nearArt>=0 && !document.getElementById('artCard').classList.contains('show')){
      promptText.textContent = "輕點螢幕查看《"+artworks[nearArt].title+"》";
      promptEl.classList.add('show');
    } else if(nearExit){
      promptText.textContent = "輕點螢幕離開美術館";
      promptEl.classList.add('show');
    } else {
      promptEl.classList.remove('show');
    }
  } else if(inGuild){
    nearGuildNPC = player.position.distanceTo(guildNPCPos) < 3;
    nearGuildExit = player.position.distanceTo(new THREE.Vector3(0,0,7)) < 3;

    if(nearGuildNPC && !document.getElementById('dialogue').classList.contains('show')){
      promptText.textContent = "輕點螢幕與薰特互動";
      promptEl.classList.add('show');
    } else if(nearGuildExit){
      promptText.textContent = "輕點螢幕離開公會";
      promptEl.classList.add('show');
    } else {
      promptEl.classList.remove('show');
    }
    if(guildLeader) guildLeader.lookAt(player.position.x, 1.2, player.position.z);
  }

  updateZoneLabel();

  if(inGallery){
    for (var smi=0; smi<sculptureMeshes.length; smi++){
      sculptureMeshes[smi].rotation.y += dt*0.5;
    }
  }

  renderer.render(scene, camera);
}

init();
animate();

})();
